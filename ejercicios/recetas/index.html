
<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="estilos.css">
  <link rel="shortcut icon" href="img/utensils-solid-full.svg" type="image/x-icon">
  <title>Recetas</title>
</head>
<body class="text-center p-4">

  <h1>Receta sorpresa</h1>

  <button type="button" class="btn btn-warning" id="nuevaReceta">Nueva receta</button>

  <div class="mt-3">
    <input type="text" id="textoBusqueda" class="form-control w-25 d-inline" placeholder="Buscar receta">
    <button class="btn btn-info" id="botonBuscar">Buscar</button>
  </div>

  <h2 class="mt-4">Favoritas</h2>
  <section id="favoritos" class="d-flex flex-wrap gap-3 justify-content-center"></section>

  <h2 class="mt-4">Resultados</h2>
  <section id="receta" class="d-flex flex-wrap gap-3 justify-content-center"></section>

  <script src="recetas.js"></script>
</body>
</html>
