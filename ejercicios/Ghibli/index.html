<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

    <link rel="stylesheet" href="estilos.css">
    <link rel="shortcut icon" href="img/torii-gate-solid-full.svg" type="image/x-icon">

    <title>Estudio Ghibli</title>
</head>

<body class="bg-light">

    <div class="container py-4">

        <h1 class="text-center mb-4">
            Películas de Studio Ghibli
        </h1>

        <div class="text-center mb-4">

            <input
                type="text"
                id="textoBusqueda"
                class="form-control w-50 d-inline"
                placeholder="Buscar película por título"
            >

            <button
                id="botonBuscar"
                class="btn btn-info ms-2"
            >
                Buscar
            </button>

        </div>


        <h2 class="text-center mb-3">Favoritas</h2>

        <section
            id="favoritos"
            class="row g-4 justify-content-center mb-5"
        ></section>


        <h2 class="text-center mb-3">Resultados</h2>

        <section
            id="peliculas"
            class="row g-4 justify-content-center"
        ></section>

    </div>

    <script src="ghibli.js"></script>

</body>
</html>
