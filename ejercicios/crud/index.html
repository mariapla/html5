<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <title>Inscripciones</title>
</head>

<body>

    <body>
        <div class="container mt-5">
            <h1 class="mb-4 text-center">Inscripciones a cosas molonas</h1>

            <div class="card p-4 shadow-sm inscripciones">
                <div class="mb-3">
                    <label for="nombrePersona" class="form-label">Nombre del participante</label>
                    <input type="text" id="nombrePersona" class="form-control" placeholder="Tu nombre aquí">
                </div>

                <div class="mb-3">
                    <label for="actividadSeleccionada" class="form-label">Actividad</label>
                    <select id="actividadSeleccionada" class="form-select">
                        <option value="">Selecciona una actividad</option>
                        <option value="Robótica">Robótica</option>
                        <option value="Diseño web">Diseño web</option>
                        <option value="Ofimática">Ofimática</option>
                        <option value="Videojuegos">Videojuegos</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Turno</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="turnoActividad" id="turnoManana"
                            value="Mañana">
                        <label class="form-check-label" for="turnoManana">Mañana</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="turnoActividad" id="turnoTarde"
                            value="Tarde">
                        <label class="form-check-label" for="turnoTarde">Tarde</label>
                    </div>
                </div>

                <div class="d-grid">
                    <button id="botonGuardar" class="btn btn-info">Añadir inscripción</button>
                </div>
            </div>

            <div class="mt-5">
                <h2 class="mb-3">Listado de inscripciones</h2>

                <div class="table-responsive">
                    <table class="table table-striped table-bordered align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Persona</th>
                                <th>Actividad</th>
                                <th>Turno</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTablaInscripciones">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <script src="inscripciones.js"></script>
    </body>

</html>
